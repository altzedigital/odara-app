<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Anfitrión - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primario: #d4a373; --fondo: #fefae0; --texto: #4a4a4a; --blanco: #ffffff; --dorado-oscuro: #b08968; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--fondo); color: var(--texto); margin: 0; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; max-width: 800px; margin: 0 auto; }
        .logo-small { max-width: 80px; height: auto; }
        .btn-salir { background: none; border: 1px solid var(--dorado-oscuro); color: var(--dorado-oscuro); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }

        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        h1 { font-weight: 600; color: var(--dorado-oscuro); margin-bottom: 5px; }
        .welcome-text { font-size: 1.1rem; margin-bottom: 25px; color: #666; }

        /* BANNER DEL LINK / NÚMERO DE MESA */
        .share-banner { 
            background: var(--primario); 
            color: white; 
            padding: 25px; 
            border-radius: 20px; 
            margin-bottom: 30px; 
            box-shadow: 0 5px 15px rgba(212, 163, 115, 0.3); 
        }
        .numero-mesa-btn {
            background: white;
            color: var(--primario);
            display: inline-block;
            padding: 10px 25px;
            border-radius: 12px;
            font-size: 1.8rem;
            font-weight: 600;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .numero-mesa-btn:hover { transform: scale(1.05); background: var(--fondo); }

        /* SECCIÓN NOTIFICACIONES (LO NUEVO) */
        #notificaciones-regalos { 
            background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; 
            text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--primario); 
        }
        .notif-item { background: #fefae0; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e9edc9; }

        /* SECCIÓN PERSONALIZACIÓN */
        .card-personalizacion { background: var(--blanco); padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .opciones-principales { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .card-btn { background: var(--blanco); padding: 20px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-btn:hover { border-color: var(--primario); transform: translateY(-3px); }
        
        #form-personalizado, #seccion-recomendaciones { display: none; background: var(--blanco); padding: 30px; border-radius: 20px; margin-top: 20px; text-align: left; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #e9edc9; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-guardar { width: 100%; background-color: var(--primario); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" alt="Odara Logo" class="logo-small">
    <button class="btn-salir" onclick="cerrarSesion()">Cerrar Sesión</button>
</header>

<div class="container">
    <h1 id="user-greeting">¡Bienvenida!</h1>
    <p class="welcome-text">Gestiona tu evento desde aquí.</p>

    <div class="share-banner">
        <span>Tu mesa de regalos es el número:</span><br>
        <div class="numero-mesa-btn" id="numero-mesa-display" onclick="copiarLink()">...</div>
        <p style="font-size: 0.75rem; margin: 5px 0 0; opacity: 0.9;">Toca el número para copiar el link de tus invitados</p>
    </div>

    <div id="notificaciones-regalos">
        <h3 style="margin-top:0; color:var(--primario);">🎁 Regalos Recibidos</h3>
        <div id="lista-notificaciones">
            <p style="color:#999; font-size: 0.8rem;">Cargando mensajes de tus invitados...</p>
        </div>
    </div>

    <div class="card-personalizacion">
        <h3 style="margin-top:0; color:var(--dorado-oscuro);">✨ Estilo de tu Mesa</h3>
        <textarea id="mensaje-bienvenida" rows="2" placeholder="Ej: ¡Bienvenidos a nuestro Baby Shower!"></textarea>
        <button class="btn-guardar" onclick="guardarConfiguracion()">Guardar Mensaje</button>
    </div>

    <div id="mis-regalos-seccion" style="background:white; padding:20px; border-radius:20px; margin-bottom:20px; text-align:left; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
        <h3 style="margin-top:0; color:var(--dorado-oscuro);">Inventario de Regalos</h3>
        <div id="mis-regalos-lista"></div>
    </div>

    <div class="opciones-principales">
        <div class="card-btn" onclick="mostrarFormulario()">
            <h3>➕ Nuevo Regalo</h3>
        </div>
        <div class="card-btn" onclick="mostrarRecomendaciones()">
            <h3>⭐ Sugerencias</h3>
        </div>
    </div>

    <div id="form-personalizado">
        <h3>Agregar Nuevo Regalo</h3>
        <input type="text" id="nombre-regalo" placeholder="Nombre del Regalo">
        <input type="text" id="foto-regalo" placeholder="URL de la imagen">
        <input type="number" id="precio-regalo" placeholder="Precio ($)">
        <button class="btn-guardar" onclick="guardarRegalo()">Añadir a mi mesa</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, query, where, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
        authDomain: "odara-15d63.firebaseapp.com",
        projectId: "odara-15d63",
        storageBucket: "odara-15d63.firebasestorage.app",
        messagingSenderId: "574365543873",
        appId: "1:574365543873:web:d55ad62b17231e39e89340"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let idEventoGlobal = null;
    let fullLinkInvitados = "";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const q = query(collection(db, "eventos"), where("uid", "==", user.uid));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                const datos = querySnapshot.docs[0].data();
                idEventoGlobal = datos.numeroEvento;
                document.getElementById('user-greeting').innerText = `¡Hola, ${datos.nombres}!`;
                document.getElementById('numero-mesa-display').innerText = idEventoGlobal;
                
                const baseUrl = window.location.origin + window.location.pathname.replace('panel.html', '');
                fullLinkInvitados = `${baseUrl}evento.html?id=${idEventoGlobal}`;
                
                cargarMisRegalos();
                cargarNotificaciones(); // CARGAMOS LOS MENSAJES DE INVITADOS
            }
        } else { window.location.href = "login.html"; }
    });

    window.cargarNotificaciones = async () => {
        const contenedor = document.getElementById('lista-notificaciones');
        const q = query(collection(db, "eventos", "evento_" + idEventoGlobal, "contribuciones"), orderBy("fecha", "desc"));
        const snap = await getDocs(q);
        
        if (snap.empty) {
            contenedor.innerHTML = "<p style='font-size:0.8rem; color:#999;'>Aún no tienes regalos confirmados.</p>";
            return;
        }

        contenedor.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            contenedor.innerHTML += `
                <div class="notif-item">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${d.invitado}</strong>
                        <span style="font-size:0.7rem; color:#999;">${d.fecha.toDate().toLocaleDateString()}</span>
                    </div>
                    <p style="margin:5px 0; font-size:0.85rem;">Regaló: <strong>${d.regalo}</strong></p>
                    <p style="margin:0; font-size:0.85rem; font-style:italic; color:#666;">"${d.mensaje || 'Sin mensaje'}"</p>
                </div>`;
        });
    };

    window.copiarLink = () => {
        navigator.clipboard.writeText(fullLinkInvitados);
        alert("¡Link copiado! Ya puedes pegarlo en WhatsApp.");
    };

    window.mostrarFormulario = () => { document.getElementById('form-personalizado').style.display = 'block'; };
    window.cerrarSesion = () => signOut(auth).then(() => window.location.href = "login.html");
</script>
</body>
</html>
