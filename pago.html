<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Regalo - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo-marfil: #FAF7F2;
            --azul-profundo: #102A43;
            --beige-arena: #E9D8C4;
            --terracota: #C97B63;
            --gris-azul: #5C6770;
            --dorado: #C8A96B;
            --blanco: #ffffff;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--fondo-marfil); color: var(--azul-profundo); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .pago-card { 
            background: var(--blanco); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(16, 42, 67, 0.08); 
            width: 100%; 
            max-width: 450px; 
            text-align: center;
            border-top: 5px solid var(--dorado); /* Detalle premium superior */
        }

        h3 { color: var(--azul-profundo); font-size: 1.5rem; margin-bottom: 10px; }
        .monto-destacado { font-size: 2.2rem; color: var(--terracota); font-weight: 600; margin: 20px 0; }
        
        .instrucciones { 
            background: var(--fondo-marfil); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: left; 
            margin: 25px 0; 
            border: 1px solid var(--beige-arena); 
        }

        label { display: block; text-align: left; font-weight: 600; font-size: 0.8rem; color: var(--gris-azul); margin-bottom: 5px; }
        input, textarea { 
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--beige-arena); 
            border-radius: 8px; box-sizing: border-box; font-family: inherit; background: var(--fondo-marfil);
        }

        .btn-finalizar { 
            background: var(--azul-profundo); color: white; border: none; padding: 16px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; 
            transition: 0.3s; letter-spacing: 1px;
        }
        .btn-finalizar:hover { background: var(--terracota); }
    </style>
</head>
<body>
    <div class="pago-card">
        <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" style="width: 70px; margin-bottom: 15px;">
        <h3>Un detalle inolvidable</h3>
        <p style="color: var(--gris-azul); font-size: 0.9rem;">Para el regalo: <strong id="nombre-regalo" style="color: var(--azul-profundo);">...</strong></p>
        
        <div class="monto-destacado" id="monto-regalo">$0.00</div>

        <div style="margin-top: 20px;">
            <label>TU NOMBRE</label>
            <input type="text" id="invitado-nombre" placeholder="¿Quién envía este regalo?">
            <label>MENSAJE DE FELICITACIÓN</label>
            <textarea id="invitado-mensaje" rows="3" placeholder="Escribe unas palabras cariñosas..."></textarea>
        </div>

        <div class="instrucciones">
            <p style="margin-top:0; font-weight: 600; color: var(--dorado); font-size: 0.8rem; letter-spacing: 1px;">DATOS BANCARIOS</p>
            <p style="margin: 5px 0; font-size: 0.9rem;"><strong>Banco:</strong> BBVA</p>
            <p style="margin: 5px 0; font-size: 0.9rem;"><strong>CLABE:</strong> 0123 4567 8901 2345 67</p>
            <p style="margin: 5px 0; font-size: 0.9rem;"><strong>Titular:</strong> Mesa de Regalos Odara</p>
        </div>

        <button class="btn-finalizar" id="btn-confirmar" onclick="confirmarYGuardar()">CONFIRMAR TRANSFERENCIA</button>
    </div>
    <!-- (El script de Firebase se mantiene igual al anterior) -->
</body>
</html>
