<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Regalos - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --fondo-marfil: #FAF7F2;
            --azul-profundo: #102A43;
            --dorado: #C8A96B;
            --terracota: #C97B63;
            --blanco: #ffffff;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--fondo-marfil); 
            color: var(--azul-profundo); 
            margin: 0; 
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; text-align: center; }
        
        .header-mesa { margin-bottom: 40px; }
        .header-mesa h1 { color: var(--azul-profundo); letter-spacing: 2px; }

        /* GRID DE REGALOS */
        .regalos-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 25px; 
        }

        .card-regalo {
            background: var(--blanco);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            position: relative;
        }

        .card-regalo img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 10px; 
        }

        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--azul-profundo);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .btn-regalar {
            background: var(--terracota);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            margin-top: 15px;
        }

        .btn-regalar:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(16, 42, 67, 0.8);
            justify-content: center; align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-mesa">
            <h1 id="nombre-evento">Cargando Mesa...</h1>
            <p id="fecha-evento"></p>
        </div>

        <div class="regalos-grid" id="lista-regalos">
            <!-- Los regalos se cargan aquí -->
        </div>
    </div>

    <!-- MODAL PARA REGALAR -->
    <div id="modal-regalo" class="modal">
        <div class="modal-content">
            <h3 id="modal-titulo-producto">Regalar</h3>
            <input type="text" id="invitado-nombre" placeholder="Tu nombre">
            <textarea id="invitado-mensaje" placeholder="Un mensaje para los anfitriones"></textarea>
            <button class="btn-regalar" onclick="confirmarRegalo()">Confirmar Regalo</button>
            <button style="background:none; border:none; color:gray; cursor:pointer; margin-top:10px;" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
            authDomain: "odara-15d63.firebaseapp.com",
            projectId: "odara-15d63",
            storageBucket: "odara-15d63.firebasestorage.app",
            messagingSenderId: "574365543873",
            appId: "1:574365543873:web:d55ad62b17231e39e89340"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const mesaId = urlParams.get('id');

        let productoSeleccionado = null;

        // 1. Cargar Datos de la Mesa
        if (mesaId) {
            db.collection("mesas_publicas").doc(mesaId).get().then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('nombre-evento').innerText = "Mesa de " + data.nombres;
                    cargarRegalos();
                }
            });
        }

        // 2. Cargar Inventario con validación de Stock
        function cargarRegalos() {
            const grid = document.getElementById('lista-regalos');
            db.collection("mesas_publicas").doc(mesaId).collection("regalos").onSnapshot(snapshot => {
                grid.innerHTML = "";
                snapshot.forEach(doc => {
                    const item = doc.data();
                    const id = doc.id;
                    const disponibles = item.cantidad_total - item.cantidad_comprada;
                    const estaAgotado = disponibles <= 0;

                    grid.innerHTML += `
                        <div class="card-regalo">
                            <div class="status-badge">
                                ${estaAgotado ? 'AGOTADO' : `Disponibles: ${disponibles}`}
                            </div>
                            <img src="${item.imagen}">
                            <h3>${item.nombre}</h3>
                            <p style="color:var(--terracota); font-weight:bold;">$${item.precio} MXN</p>
                            <button class="btn-regalar" 
                                ${estaAgotado ? 'disabled' : ''} 
                                onclick="abrirModalRegalo('${id}', '${item.nombre}', ${item.precio}, '${item.imagen}')">
                                ${estaAgotado ? 'Ya regalado' : 'Regalar este detalle'}
                            </button>
                        </div>
                    `;
                });
            });
        }

        // 3. Lógica del Proceso de Regalo
        function abrirModalRegalo(id, nombre, precio, imagen) {
            productoSeleccionado = { id, nombre, precio, imagen };
            document.getElementById('modal-titulo-producto').innerText = "Regalar " + nombre;
            document.getElementById('modal-regalo').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal-regalo').style.display = 'none';
        }

        function confirmarRegalo() {
            const nombre = document.getElementById('invitado-nombre').value;
            const mensaje = document.getElementById('invitado-mensaje').value;

            if (!nombre) return alert("Por favor, agrega tu nombre.");

            // A. Registrar el regalo recibido
            db.collection("mesas_publicas").doc(mesaId).collection("regalos_recibidos").add({
                nombre_invitado: nombre,
                mensaje: mensaje,
                producto_nombre: productoSeleccionado.nombre,
                producto_imagen: productoSeleccionado.imagen,
                monto: productoSeleccionado.precio,
                fecha: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                // B. Actualizar el contador de "cantidad_comprada" en el inventario
                const refProducto = db.collection("mesas_publicas").doc(mesaId).collection("regalos").doc(productoSeleccionado.id);
                
                return refProducto.update({
                    cantidad_comprada: firebase.firestore.FieldValue.increment(1)
                });
            }).then(() => {
                alert("¡Gracias por tu regalo! Se ha notificado a los anfitriones.");
                cerrarModal();
            }).catch(err => console.error("Error:", err));
        }
    </script>
</body>
</html>
