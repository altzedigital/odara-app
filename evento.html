<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Regalos - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primario: #d4a373; --fondo: #fefae0; --texto: #4a4a4a; --blanco: #ffffff; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--fondo); color: var(--texto); margin: 0; padding: 0; }
        
        .hero { background: var(--blanco); padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--primario); }
        .foto-anfitriones { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primario); margin-bottom: 15px; }
        
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .grid-regalos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        
        .card-regalo { background: var(--blanco); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .card-regalo img { width: 100%; height: 200px; object-fit: cover; }
        .info-regalo { padding: 20px; text-align: center; }
        .precio { font-size: 1.2rem; font-weight: 600; color: var(--primario); margin: 10px 0; }
        
        .btn-regalar { background-color: var(--primario); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        .stock { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="hero" id="header-evento">
    <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" alt="Logo Odara" style="max-width: 100px; margin-bottom: 20px;">
    <div id="datos-anfitriones">
        <p>Cargando evento...</p>
    </div>
</div>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 40px;">Mesa de Regalos</h2>
    <div class="grid-regalos" id="contenedor-regalos">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
        authDomain: "odara-15d63.firebaseapp.com",
        projectId: "odara-15d63",
        storageBucket: "odara-15d63.firebasestorage.app",
        messagingSenderId: "574365543873",
        appId: "1:574365543873:web:d55ad62b17231e39e89340",
        measurementId: "G-0LYV3GE6KK"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function cargarEvento() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) {
            document.getElementById('datos-anfitriones').innerHTML = "<h1>Evento no encontrado</h1>";
            return;
        }

        // 1. Cargar Datos del Evento (Nombres y Foto)
        const docRef = doc(db, "eventos", "evento_" + id);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('datos-anfitriones').innerHTML = `
                <img src="${data.foto}" class="foto-anfitriones">
                <h1 style="margin:0">${data.nombres}</h1>
                <p style="font-style: italic; color: #777;">${data.bienvenida}</p>
            `;
        }

        // 2. Cargar Regalos
        const regalosRef = collection(db, "eventos", "evento_" + id, "regalos");
        const querySnapshot = await getDocs(regalosRef);
        const contenedor = document.getElementById('contenedor-regalos');
        contenedor.innerHTML = "";

        querySnapshot.forEach((docRegalo) => {
            const regalo = docRegalo.data();
            const faltantes = regalo.cantidadTotal - regalo.cantidadComprada;

            if (faltantes > 0) {
                contenedor.innerHTML += `
                    <div class="card-regalo">
                        <img src="${regalo.foto}">
                        <div class="info-regalo">
                            <h3 style="margin:0">${regalo.nombre}</h3>
                            <p class="precio">$${regalo.precio} MXN</p>
                            <p class="stock">Disponibles: ${faltantes} de ${regalo.cantidadTotal}</p>
                            <button class="btn-regalar" onclick="procesarRegalo('${docRegalo.id}')">Regalar</button>
                        </div>
                    </div>
                `;
            }
        });
    }

    window.procesarRegalo = (idRegalo) => {
        alert("¡Gracias! En el siguiente paso conectaremos la pasarela de pago para completar este regalo.");
    };

    cargarEvento();
</script>
</body>
</html>
