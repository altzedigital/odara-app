<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Regalos - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primario: #d4a373; --fondo: #fefae0; --texto: #4a4a4a; --blanco: #ffffff; --dorado-oscuro: #b08968; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--fondo); color: var(--texto); margin: 0; padding: 0; }

        /* HEADER / PORTADA DINÁMICA */
        .hero { 
            position: relative; 
            height: 40vh; 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            text-align: center;
        }
        .hero-overlay { 
            position: absolute; 
            top:0; left:0; right:0; bottom:0; 
            background: rgba(0,0,0,0.3); 
        }
        .hero-content { position: relative; z-index: 1; padding: 20px; }
        .hero h1 { font-size: 2.5rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        .container { max-width: 900px; margin: -40px auto 40px; position: relative; z-index: 2; padding: 0 20px; }
        
        /* TARJETA DE BIENVENIDA */
        .bienvenida-card { 
            background: var(--blanco); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; 
            margin-bottom: 30px; 
        }
        .bienvenida-card p { font-style: italic; color: #666; line-height: 1.6; font-size: 1.1rem; }

        /* GRID DE REGALOS */
        .grid-regalos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card-regalo { 
            background: var(--blanco); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            transition: 0.3s; 
            display: flex; 
            flex-direction: column;
        }
        .card-regalo:hover { transform: translateY(-5px); }
        .img-regalo { width: 100%; height: 200px; object-fit: cover; }
        .info-regalo { padding: 20px; text-align: center; flex-grow: 1; }
        .info-regalo h3 { margin: 0 0 10px; color: var(--texto); font-size: 1rem; }
        .precio { color: var(--primario); font-weight: 600; font-size: 1.2rem; margin-bottom: 15px; display: block; }
        
        .btn-regalar { 
            background: var(--primario); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            transition: 0.3s;
        }
        .btn-regalar:hover { background: var(--dorado-oscuro); }

        footer { text-align: center; padding: 40px 20px; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="hero" id="hero-bg" style="background-image: url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=1000');">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1 id="titulo-evento">Cargando evento...</h1>
    </div>
</div>

<div class="container">
    <div class="bienvenida-card">
        <p id="texto-bienvenida">Estamos muy felices de que nos acompañes en este día tan especial.</p>
    </div>

    <div class="grid-regalos" id="contenedor-regalos">
        </div>
</div>

<footer>
    Creado con ♡ por Odara
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
        authDomain: "odara-15d63.firebaseapp.com",
        projectId: "odara-15d63",
        storageBucket: "odara-15d63.firebasestorage.app",
        messagingSenderId: "574365543873",
        appId: "1:574365543873:web:d55ad62b17231e39e89340"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Obtener el ID del evento de la URL (ej: evento.html?id=100)
    const params = new URLSearchParams(window.location.search);
    const idEvento = params.get('id');

    if (!idEvento) {
        document.body.innerHTML = "<h1>Evento no encontrado</h1>";
    } else {
        cargarDatosEvento();
    }

    async function cargarDatosEvento() {
        try {
            // 1. Obtener Info General del Evento
            const eventoRef = doc(db, "eventos", "evento_" + idEvento);
            const eventoSnap = await getDoc(eventoRef);

            if (eventoSnap.exists()) {
                const datos = eventoSnap.data();
                
                // Actualizar UI con la personalización
                document.getElementById('titulo-evento').innerText = `Mesa de ${datos.nombres}`;
                document.getElementById('texto-bienvenida').innerText = datos.bienvenida || "¡Bienvenidos a nuestro evento!";
                
                if (datos.foto) {
                    document.getElementById('hero-bg').style.backgroundImage = `url('${datos.foto}')`;
                }

                // 2. Cargar Regalos de la Subcolección
                cargarRegalos();
            }
        } catch (e) {
            console.error("Error cargando evento:", e);
        }
    }

    async function cargarRegalos() {
        const contenedor = document.getElementById('contenedor-regalos');
        const regalosRef = collection(db, "eventos", "evento_" + idEvento, "regalos");
        const querySnapshot = await getDocs(regalosRef);

        contenedor.innerHTML = "";
        
        querySnapshot.forEach((docSnap) => {
            const regalo = docSnap.data();
            const tarjeta = `
                <div class="card-regalo">
                    <img src="${regalo.foto || 'https://via.placeholder.com/300'}" class="img-regalo">
                    <div class="info-regalo">
                        <h3>${regalo.nombre}</h3>
                        <span class="precio">$${regalo.precio}</span>
                        <button class="btn-regalar" onclick="confirmarRegalo('${regalo.nombre}', '${idEvento}')">
                            Regalar este detalle
                        </button>
                    </div>
                </div>
            `;
            contenedor.innerHTML += tarjeta;
        });
    }

    // PASO 3: Notificación rápida vía WhatsApp
    window.confirmarRegalo = (nombreRegalo, id) => {
        const mensaje = `¡Hola! Me encantaría regalarte "${nombreRegalo}" de tu mesa en Odara. ¿Me podrías compartir los detalles para el depósito?`;
        const linkWhatsapp = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
        window.open(linkWhatsapp, '_blank');
    };

</script>
</body>
</html>
