<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Regalos | Odara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fcfaf7; }
        .font-serif { font-family: 'Cinzel', serif; }
        .bg-odara-blue { background-color: #001f3f; }
        .text-odara-gold { color: #c5a059; }
        .border-odara-gold { border-color: #c5a059; }
        .btn-gold { 
            background-color: #c5a059; 
            color: white;
            transition: all 0.3s ease;
        }
        .btn-gold:hover { background-color: #a38445; transform: translateY(-2px); }
    </style>
</head>
<body>

    <header class="bg-odara-blue text-white py-20 px-4 text-center shadow-2xl border-b-4 border-odara-gold">
        <div class="max-w-4xl mx-auto">
            <h1 id="nombres-novios" class="font-serif text-5xl md:text-7xl mb-6 text-odara-gold tracking-widest uppercase">Cargando...</h1>
            <div class="h-1 w-32 bg-odara-gold mx-auto mb-6"></div>
            <p class="text-xl opacity-80 italic tracking-widest">Nuestra Mesa de Regalos</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-16 px-6">
        <section class="text-center mb-20 bg-white p-10 rounded-lg shadow-sm border border-gray-100">
            <h2 class="font-serif text-3xl mb-6 text-odara-blue">Bienvenidos</h2>
            <p id="mensaje-bienvenida" class="text-gray-600 max-w-3xl mx-auto text-lg leading-relaxed italic">
                Estamos preparando los detalles de nuestro gran día...
            </p>
        </section>

        <div class="flex justify-between items-center mb-12 border-b border-gray-200 pb-4">
            <h3 class="font-serif text-3xl text-odara-blue">Selección de Regalos</h3>
            <span class="text-sm text-gray-400 uppercase tracking-widest">Odara Exclusive</span>
        </div>

        <div id="contenedor-regalos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        </div>
    </main>

    <footer class="py-10 text-center text-gray-400 text-sm tracking-widest uppercase font-light">
        Odara &copy; 2024 | Experiencias Inolvidables
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
            authDomain: "odara-15d63.firebaseapp.com",
            projectId: "odara-15d63",
            storageBucket: "odara-15d63.firebasestorage.app",
            messagingSenderId: "574365543873",
            appId: "1:574365543873:web:d55ad62b17231e39e89340"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const mesaId = urlParams.get('id');

        // LÓGICA DE NEGOCIO: Comisión del 10% cobrada al invitado
        window.comprarRegalo = function(nombre, precio) {
            const comision = 0.10; // Tu ganancia
            const precioOriginal = parseFloat(precio);
            const cargoServicio = precioOriginal * comision;
            const total = precioOriginal + cargoServicio;

            const fmt = (val) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(val);

            const mensaje = `Detalles de tu regalo:\n\n` +
                            `Regalo: ${nombre}\n` +
                            `Precio: ${fmt(precioOriginal)}\n` +
                            `Cargo por servicio: ${fmt(cargoServicio)}\n` +
                            `---------------------------\n` +
                            `Total a pagar: ${fmt(total)}\n\n` +
                            `¿Deseas proceder al pago seguro?`;

            if (confirm(mensaje)) {
                // Siguiente fase: Integración de checkout
                alert("Redirigiendo a pasarela segura por " + fmt(total) + "...");
            }
        };

        async function cargarEvento() {
            if (!mesaId) {
                document.getElementById('nombres-novios').innerText = "ID de Mesa no válido";
                return;
            }

            try {
                const q = query(collection(db, "mesas"), where("id_mesa", "==", parseInt(mesaId)));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const docMesa = querySnapshot.docs[0];
                    const datosMesa = docMesa.data();

                    document.getElementById('nombres-novios').innerText = datosMesa.nombres || "Nuestra Boda";
                    document.getElementById('mensaje-bienvenida').innerText = datosMesa.mensaje || "Gracias por acompañarnos.";

                    cargarRegalos(docMesa.id);
                } else {
                    document.getElementById('nombres-novios').innerText = "Mesa no encontrada";
                }
            } catch (error) {
                console.error("Error al cargar:", error);
            }
        }

        async function cargarRegalos(docIdInterno) {
            const container = document.getElementById('contenedor-regalos');
            const regalosRef = collection(db, "mesas", docIdInterno, "regalos");
            const snapshot = await getDocs(regalosRef);

            container.innerHTML = "";

            if (snapshot.empty) {
                container.innerHTML = "<p class='text-center col-span-full text-gray-400 text-lg italic py-10'>Aún no se han añadido regalos a esta lista.</p>";
                return;
            }

            snapshot.forEach((doc) => {
                const regalo = doc.data();
                container.innerHTML += `
                    <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100 group transition-all duration-300 hover:shadow-2xl">
                        <div class="relative overflow-hidden h-72">
                            <img src="${regalo.foto}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" alt="${regalo.nombre}">
                            <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-10 transition-all"></div>
                        </div>
                        <div class="p-8 text-center">
                            <h4 class="font-serif text-2xl mb-3 text-odara-blue uppercase tracking-tighter">${regalo.nombre}</h4>
                            <p class="text-odara-gold font-bold text-xl mb-6 tracking-widest italic">$${Number(regalo.precio).toLocaleString()} MXN</p>
                            <button onclick="comprarRegalo('${regalo.nombre}', ${regalo.precio})" class="btn-gold w-full py-4 rounded-md uppercase text-xs font-bold tracking-[0.2em] shadow-md">
                                Regalar ahora
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        cargarEvento();
    </script>
</body>
</html>
