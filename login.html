<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- SDK de Firebase (Versión Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --fondo-marfil: #FAF7F2;
            --azul-profundo: #102A43;
            --beige-arena: #E9D8C4;
            --terracota: #C97B63;
            --gris-azul: #5C6770;
            --dorado: #C8A96B;
            --blanco: #ffffff;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--fondo-marfil); 
            color: var(--azul-profundo); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            padding: 20px 5%; 
            text-align: center; 
            background: var(--blanco);
            border-bottom: 1px solid var(--beige-arena);
        }
        .logo { max-width: 80px; }

        .main-auth {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: var(--blanco);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(16, 42, 67, 0.05);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--dorado);
        }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { font-size: 1.8rem; margin-bottom: 10px; color: var(--azul-profundo); }
        .decor { width: 40px; height: 2px; background: var(--dorado); margin: 20px auto; }

        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-weight: 600; 
            font-size: 0.75rem; 
            color: var(--gris-azul); 
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .input-auth {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--beige-arena);
            border-radius: 8px;
            background-color: var(--fondo-marfil);
            font-family: inherit;
            color: var(--azul-profundo);
            box-sizing: border-box;
            outline: none;
        }
        .input-auth:focus { border-color: var(--dorado); }

        .btn-login {
            width: 100%;
            background-color: var(--azul-profundo);
            color: var(--blanco);
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            font-size: 1rem;
        }
        .btn-login:hover {
            background-color: var(--terracota);
            transform: translateY(-1px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--gris-azul);
        }
        .auth-footer a {
            color: var(--terracota);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html">
        <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" alt="Odara Logo" class="logo">
    </a>
</header>

<main class="main-auth">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Bienvenida</h2>
            <p style="color: var(--gris-azul); font-size: 0.9rem;">Accede a tu panel para gestionar tus regalos.</p>
            <div class="decor"></div>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" class="input-auth" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" class="input-auth" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="btn-entrar">ENTRAR A MI PANEL</button>
        </form>

        <div class="auth-footer">
            ¿Aún no tienes cuenta? <a href="registro.html">Crea tu mesa aquí</a>
        </div>
    </div>
</main>

<footer style="background: var(--azul-profundo); padding: 20px; text-align: center; color: var(--fondo-marfil); font-size: 0.7rem;">
    © 2026 Odara. Experiencias que perduran.
</footer>

<script>
    // 1. CONFIGURACIÓN DE TU PROYECTO (Pega aquí tus datos de la consola)
    const firebaseConfig = {
  apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
  authDomain: "odara-15d63.firebaseapp.com",
  projectId: "odara-15d63",
  storageBucket: "odara-15d63.firebasestorage.app",
  messagingSenderId: "574365543873",
  appId: "1:574365543873:web:d55ad62b17231e39e89340",
  measurementId: "G-0LYV3GE6KK"
};

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 2. LÓGICA DE LOGIN
    const loginForm = document.getElementById('login-form');

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault(); // Evita que la página se recargue

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('btn-entrar');

        // Feedback visual de carga
        btn.innerText = "VERIFICANDO...";
        btn.disabled = true;

        auth.signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                // Éxito: Redirigir al panel
                window.location.href = "dashboard.html";
            })
            .catch((error) => {
                // Error: Mostrar mensaje amable
                btn.innerText = "ENTRAR A MI PANEL";
                btn.disabled = false;
                
                let mensajeError = "Ocurrió un error al entrar.";
                if (error.code === "auth/user-not-found") mensajeError = "El usuario no existe.";
                if (error.code === "auth/wrong-password") mensajeError = "Contraseña incorrecta.";
                
                alert(mensajeError);
                console.error(error.message);
            });
    });
</script>

</body>
</html>
