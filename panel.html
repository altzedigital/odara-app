<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --fondo-marfil: #FAF7F2;
            --azul-profundo: #102A43;
            --dorado: #C8A96B;
            --terracota: #C97B63;
            --blanco: #ffffff;
            --gris-azul: #5C6770;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            background-color: var(--fondo-marfil); 
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 250px;
            background-color: var(--azul-profundo);
            height: 100vh;
            color: white;
            padding: 30px 20px;
            position: fixed;
        }
        .sidebar h2 { color: var(--dorado); font-size: 1.2rem; letter-spacing: 2px; }
        .nav-links { margin-top: 50px; }
        .nav-links a { 
            display: block; color: white; text-decoration: none; 
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
        }
        .btn-logout { 
            margin-top: 100px; background: none; border: 1px solid var(--terracota); 
            color: var(--terracota); padding: 10px 20px; cursor: pointer; width: 100%;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content { margin-left: 280px; padding: 40px; width: 100%; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .card-stats {
            background: var(--blanco); padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-left: 5px solid var(--dorado);
            margin-bottom: 30px;
        }

        /* --- FORMULARIO --- */
        .form-regalo {
            background: var(--blanco); padding: 30px; border-radius: 15px;
            max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .form-regalo input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;
        }
        .btn-add {
            background: var(--azul-profundo); color: white; border: none;
            padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* --- LISTA DE REGALOS --- */
        .lista-regalos { margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .item-regalo { background: white; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .item-regalo img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ODARA</h2>
        <div class="nav-links">
            <a href="#">Mis Regalos</a>
            <a href="#" id="link-mi-mesa" target="_blank">Ver mi Mesa pública</a>
            <a href="#">Configuración</a>
        </div>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <div class="header-panel">
            <h1 id="bienvenida">Bienvenida...</h1>
            <span id="id-evento-display" style="background: var(--dorado); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;">ID: ---</span>
        </div>

        <div class="card-stats">
            <h3 style="margin: 0; color: var(--gris-azul);">Total Recaudado</h3>
            <p style="font-size: 2rem; font-weight: 600; color: var(--azul-profundo); margin: 10px 0;">$0.00 MXN</p>
        </div>

        <div class="form-regalo">
            <h3>Agregar nuevo regalo</h3>
            <input type="text" id="nombre-regalo" placeholder="Nombre del regalo (ej: Vajilla)">
            <input type="number" id="precio-regalo" placeholder="Precio (ej: 1500)">
            <input type="text" id="imagen-regalo" placeholder="Link de la imagen del producto">
            <button class="btn-add" onclick="subirRegalo()">Añadir a la lista</button>
        </div>

        <div class="lista-regalos" id="contenedor-regalos">
            </div>
    </div>

    <script>
        // CONFIGURACIÓN DE FIREBASE (Tus credenciales guardadas)
        const firebaseConfig = {
            apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
            authDomain: "odara-15d63.firebaseapp.com",
            projectId: "odara-15d63",
            storageBucket: "odara-15d63.firebasestorage.app",
            messagingSenderId: "574365543873",
            appId: "1:574365543873:web:d55ad62b17231e39e89340",
            measurementId: "G-0LYV3GE6KK"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let mesaActualId = "";

        // 1. PROTEGER RUTA Y CARGAR DATOS
        auth.onAuthStateChanged(user => {
            if (user) {
                // El usuario está logueado, buscamos su mesa
                db.collection("mesas_publicas").where("dueno_id", "==", user.uid).get()
                .then(querySnapshot => {
                    querySnapshot.forEach(doc => {
                        const data = doc.data();
                        mesaActualId = doc.id;
                        document.getElementById('bienvenida').innerText = "Hola, " + data.nombres;
                        document.getElementById('id-evento-display').innerText = "Mesa ID: " + mesaActualId;
                        document.getElementById('link-mi-mesa').href = "mesa.html?id=" + mesaActualId;
                        cargarRegalosPanel();
                    });
                });
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. SUBIR REGALO A FIRESTORE
        function subirRegalo() {
            const nombre = document.getElementById('nombre-regalo').value;
            const precio = document.getElementById('precio-regalo').value;
            const imagen = document.getElementById('imagen-regalo').value;

            if(nombre && precio && imagen) {
                db.collection("mesas_publicas").doc(mesaActualId).collection("regalos").add({
                    nombre: nombre,
                    precio: Number(precio),
                    imagen: imagen,
                    fecha_creacion: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    alert("Regalo añadido con éxito");
                    location.reload(); // Recargamos para ver el nuevo item
                });
            } else {
                alert("Por favor llena todos los campos");
            }
        }

        // 3. CARGAR REGALOS EN EL PANEL
        function cargarRegalosPanel() {
            const contenedor = document.getElementById('contenedor-regalos');
            db.collection("mesas_publicas").doc(mesaActualId).collection("regalos").get().then(querySnapshot => {
                querySnapshot.forEach(doc => {
                    const r = doc.data();
                    contenedor.innerHTML += `
                        <div class="item-regalo">
                            <img src="${r.imagen}">
                            <p><strong>${r.nombre}</strong></p>
                            <p style="color: var(--terracota)">$${r.precio}</p>
                        </div>
                    `;
                });
            });
        }

        // 4. CERRAR SESIÓN
        function cerrarSesion() {
            auth.signOut().then(() => {
                window.location.href = "login.html";
            });
        }
    </script>
</body>
</html>
