<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Anfitrión - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primario: #d4a373; --fondo: #fefae0; --texto: #4a4a4a; --blanco: #ffffff; --dorado-oscuro: #b08968; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--fondo); color: var(--texto); margin: 0; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; max-width: 800px; margin: 0 auto; }
        .logo-small { max-width: 80px; height: auto; }
        .btn-salir { background: none; border: 1px solid var(--dorado-oscuro); color: var(--dorado-oscuro); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }

        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        h1 { font-weight: 600; color: var(--dorado-oscuro); margin-bottom: 5px; }
        .welcome-text { font-size: 1.1rem; margin-bottom: 25px; color: #666; }

        .card-personalizacion { background: var(--blanco); padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .galeria-portadas { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: thin; }
        .img-portada-opcion { width: 100px; height: 70px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 3px solid transparent; transition: 0.3s; flex-shrink: 0; }
        .img-portada-opcion.seleccionada { border-color: var(--primario); transform: scale(1.05); }

        .share-banner { background: var(--primario); color: white; padding: 20px; border-radius: 20px; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(212, 163, 115, 0.3); }
        .btn-share { background: white; color: var(--primario); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        .opciones-principales { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .card-btn { background: var(--blanco); padding: 30px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card-btn:hover { border-color: var(--primario); transform: translateY(-3px); }
        .card-btn h3 { margin: 10px 0; color: var(--primario); font-size: 1rem; }
        
        #form-personalizado, #seccion-recomendaciones { display: none; background: var(--blanco); padding: 30px; border-radius: 20px; margin-top: 20px; text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 15px; }
        label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #e9edc9; border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        
        .btn-guardar { width: 100%; background-color: var(--primario); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .grid-catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .item-regalo { background: var(--fondo); padding: 15px; border-radius: 15px; text-align: center; }
        .item-regalo img { width: 100%; border-radius: 10px; height: 130px; object-fit: cover; }
        .regalo-gestion { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>

<header>
    <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" alt="Odara Logo" class="logo-small">
    <button class="btn-salir" onclick="cerrarSesion()">Cerrar Sesión</button>
</header>

<div class="container">
    <h1 id="user-greeting">¡Bienvenida!</h1>
    <p class="welcome-text">Personaliza tu mesa y gestiona tus regalos.</p>

    <div class="card-personalizacion">
        <h3 style="margin-top:0; color:var(--dorado-oscuro);">✨ Estilo de tu Mesa</h3>
        <label>1. Elige una foto de portada</label>
        <div class="galeria-portadas" id="galeria-portadas"></div>
        
        <div class="input-group" style="margin-top:15px;">
            <label>2. Tu mensaje de bienvenida</label>
            <textarea id="mensaje-bienvenida" rows="2" placeholder="Ej: ¡Bienvenidos a nuestro Baby Shower!"></textarea>
        </div>
        <button class="btn-guardar" onclick="guardarConfiguracion()" style="margin-top:0; padding:10px;">Guardar Estilo</button>
    </div>

    <div class="share-banner">
        <span style="font-size: 0.9rem;">Link para tus invitados:</span>
        <strong id="link-display" style="font-size: 0.8rem; opacity: 0.9;">cargando link...</strong>
        <button class="btn-share" onclick="copiarLink()">Copiar Link de Invitados</button>
    </div>

    <div id="mis-regalos-seccion" style="background:white; padding:20px; border-radius:20px; margin-bottom:20px; text-align:left; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
        <h3 style="margin-top:0; color:var(--dorado-oscuro);">Tus Regalos Actuales</h3>
        <div id="mis-regalos-lista">
            <p style="color:#999;">Cargando tus regalos...</p>
        </div>
    </div>

    <div class="opciones-principales">
        <div class="card-btn" onclick="mostrarFormulario()">
            <h3>🎁 Crear Regalo</h3>
            <p>Sube algo específico.</p>
        </div>
        <div class="card-btn" onclick="mostrarRecomendaciones()">
            <h3>⭐ Sugerencias</h3>
            <p>Ideas de Odara.</p>
        </div>
    </div>

    <div id="form-personalizado">
        <h3>Agregar Nuevo Regalo</h3>
        <div class="input-group">
            <label>Nombre del Regalo</label>
            <input type="text" id="nombre-regalo" placeholder="Ej: Carriola de Paseo">
        </div>
        <div class="input-group">
            <label>Link de la Imagen (URL)</label>
            <input type="text" id="foto-regalo" placeholder="Pega el link de la foto">
        </div>
        <div class="input-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Precio Unitario ($)</label>
                <input type="number" id="precio-regalo" placeholder="1500">
            </div>
            <div style="flex: 1;">
                <label>Cantidad</label>
                <input type="number" id="cantidad-regalo" value="1">
            </div>
        </div>
        <button class="btn-guardar" onclick="guardarRegalo()">Añadir a mi mesa</button>
    </div>

    <div id="seccion-recomendaciones">
        <h3 style="margin-top:0;">Catálogo Odara</h3>
        <div class="grid-catalogo" id="grid-recomendaciones"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
        authDomain: "odara-15d63.firebaseapp.com",
        projectId: "odara-15d63",
        storageBucket: "odara-15d63.firebasestorage.app",
        messagingSenderId: "574365543873",
        appId: "1:574365543873:web:d55ad62b17231e39e89340"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let idEventoGlobal = null;
    let portadaElegida = "";

    const portadasDisponibles = [
        "https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=500",
        "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=500",
        "https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=500",
        "https://images.unsplash.com/photo-1550005816-09246d37738c?w=500",
        "https://images.unsplash.com/photo-1522673607200-1648832cee98?w=500"
    ];

    const contenedorPortadas = document.getElementById('galeria-portadas');
    portadasDisponibles.forEach(url => {
        const img = document.createElement('img');
        img.src = url;
        img.className = 'img-portada-opcion';
        img.onclick = () => {
            portadaElegida = url;
            document.querySelectorAll('.img-portada-opcion').forEach(i => i.classList.remove('seleccionada'));
            img.classList.add('seleccionada');
        };
        contenedorPortadas.appendChild(img);
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const q = query(collection(db, "eventos"), where("uid", "==", user.uid));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
                const eventoDoc = querySnapshot.docs[0];
                const datos = eventoDoc.data();
                idEventoGlobal = datos.numeroEvento;

                document.getElementById('user-greeting').innerText = `¡Hola, ${datos.nombres}!`;
                document.getElementById('mensaje-bienvenida').value = datos.bienvenida || "";
                portadaElegida = datos.foto || "";
                
                document.querySelectorAll('.img-portada-opcion').forEach(img => {
                    if(img.src === portadaElegida) img.classList.add('seleccionada');
                });

                // AJUSTE AQUÍ: Generar link dinámico
                const baseUrl = window.location.origin + window.location.pathname.replace('panel.html', '');
                document.getElementById('link-display').innerText = `${baseUrl}evento.html?id=${idEventoGlobal}`;
                
                cargarMisRegalos();
            }
        } else {
            window.location.href = "login.html";
        }
    });

    window.guardarConfiguracion = async function() {
        const msg = document.getElementById('mensaje-bienvenida').value;
        try {
            const eventoRef = doc(db, "eventos", "evento_" + idEventoGlobal);
            await updateDoc(eventoRef, { bienvenida: msg, foto: portadaElegida });
            alert("¡Estilo actualizado!");
        } catch (e) { alert("Error al guardar."); }
    };

    window.cerrarSesion = () => signOut(auth).then(() => window.location.href = "login.html");

    window.copiarLink = () => {
        navigator.clipboard.writeText(document.getElementById('link-display').innerText);
        alert("¡Link copiado!");
    };

    async function cargarMisRegalos() {
        const contenedor = document.getElementById('mis-regalos-lista');
        const regalosRef = collection(db, "eventos", "evento_" + idEventoGlobal, "regalos");
        const q = query(regalosRef, orderBy("fechaAgregado", "desc"));
        const querySnapshot = await getDocs(q);
        contenedor.innerHTML = querySnapshot.empty ? "<p>No has añadido regalos.</p>" : "";
        querySnapshot.forEach((documento) => {
            const regalo = documento.data();
            contenedor.innerHTML += `
                <div class="regalo-gestion">
                    <div style="display:flex; align-items:center;">
                        <img src="${regalo.foto}" style="width:45px; height:45px; object-fit:cover; border-radius:6px; margin-right:12px;">
                        <div>
                            <strong style="font-size:0.9rem;">${regalo.nombre}</strong><br>
                            <span style="font-size:0.75rem; color:var(--primario)">$${regalo.precio} | Cant: ${regalo.cantidadTotal}</span>
                        </div>
                    </div>
                    <button onclick="eliminarRegalo('${documento.id}')" style="background:none; border:none; color:red; cursor:pointer;">Eliminar</button>
                </div>
            `;
        });
    }

    window.eliminarRegalo = async function(docId) {
        if(confirm("¿Borrar?")) {
            await deleteDoc(doc(db, "eventos", "evento_" + idEventoGlobal, "regalos", docId));
            cargarMisRegalos();
        }
    };

    window.guardarRegalo = async function() {
        const nombre = document.getElementById('nombre-regalo').value;
        const foto = document.getElementById('foto-regalo').value;
        const precio = Number(document.getElementById('precio-regalo').value);
        const cantidad = Number(document.getElementById('cantidad-regalo').value);
        if(!nombre || !precio) return alert("Completa los datos.");
        try {
            await addDoc(collection(db, "eventos", "evento_" + idEventoGlobal, "regalos"), {
                nombre, foto, precio, cantidadTotal: cantidad, cantidadComprada: 0, fechaAgregado: new Date()
            });
            alert("¡Añadido!");
            cargarMisRegalos();
        } catch (e) { alert("Error."); }
    };

    const recomendaciones = [
        { nombre: "Vajilla Nórdica", precio: 2200, foto: "https://images.unsplash.com/photo-1610701596007-11502861dcfa?w=400" },
        { nombre: "Cena Degustación", precio: 3500, foto: "https://images.unsplash.com/photo-1559339352-11d035aa65de?w=400" },
        { nombre: "Set de Copas Cristal", precio: 1500, foto: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=400" }
    ];

    const grid = document.getElementById('grid-recomendaciones');
    recomendaciones.forEach(item => {
        grid.innerHTML += `
            <div class="item-regalo">
                <img src="${item.foto}">
                <h4 style="font-size:0.85rem;">${item.nombre}</h4>
                <p style="color:var(--primario);">$${item.precio}</p>
                <button onclick="prellenarFormulario('${item.nombre}', ${item.precio}, '${item.foto}')" class="btn-guardar" style="padding:6px; font-size:0.75rem;">Elegir</button>
            </div>
        `;
    });

    window.prellenarFormulario = (nombre, precio, foto) => {
        document.getElementById('nombre-regalo').value = nombre;
        document.getElementById('precio-regalo').value = precio;
        document.getElementById('foto-regalo').value = foto;
        window.mostrarFormulario();
    };

    window.mostrarFormulario = () => {
        document.getElementById('form-personalizado').style.display = 'block';
        document.getElementById('seccion-recomendaciones').style.display = 'none';
    };

    window.mostrarRecomendaciones = () => {
        document.getElementById('seccion-recomendaciones').style.display = 'block';
        document.getElementById('form-personalizado').style.display = 'none';
    };
</script>
</body>
</html>
