<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo-marfil: #FAF7F2;
            --azul-profundo: #102A43;
            --beige-arena: #E9D8C4;
            --terracota: #C97B63;
            --gris-azul: #5C6770;
            --dorado: #C8A96B;
            --blanco: #ffffff;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--fondo-marfil); 
            color: var(--azul-profundo); 
            margin: 0; 
        }

        /* SIDEBAR / NAV */
        nav {
            background-color: var(--blanco);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--beige-arena);
        }
        .logo-panel { max-width: 60px; }

        /* LAYOUT */
        .container { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        
        .welcome-header { margin-bottom: 40px; }
        .welcome-header h1 { font-weight: 300; font-size: 2rem; }
        .welcome-header span { font-weight: 600; color: var(--terracota); }

        /* SECCIÓN CATÁLOGO */
        .section-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .line { flex: 1; height: 1px; background: var(--beige-arena); }

        .grid-catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .card-producto {
            background: var(--blanco);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--beige-arena);
            text-align: center;
            transition: 0.3s;
        }
        .card-producto:hover {
            border-color: var(--dorado);
            transform: translateY(-5px);
        }

        .card-producto h3 { font-size: 1.1rem; margin-bottom: 15px; }

        /* EDITOR DE PRECIO */
        .price-editor {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            background: var(--fondo-marfil);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .price-editor span { font-weight: 600; color: var(--gris-azul); }
        .input-precio {
            width: 80px;
            border: none;
            background: transparent;
            font-family: 'Montserrat';
            font-weight: 600;
            font-size: 1rem;
            color: var(--azul-profundo);
            text-align: center;
            border-bottom: 2px solid var(--dorado);
        }
        .input-precio:focus { outline: none; border-bottom-color: var(--terracota); }

        .btn-add {
            background-color: var(--azul-profundo);
            color: var(--blanco);
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn-add:hover { background-color: var(--terracota); }

    </style>
</head>
<body>

<nav>
    <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" alt="Odara" class="logo-panel">
    <div class="user-menu">
        <strong>Mi Mesa</strong> | <a href="login.html" style="color: var(--gris-azul); text-decoration: none; font-size: 0.8rem;">Cerrar Sesión</a>
    </div>
</nav>

<div class="container">
    <header class="welcome-header">
        <h1>Bienvenida a tu panel, <span>Anfitriona</span></h1>
        <p>Selecciona los regalos que quieres incluir en tu lista y ajusta su valor.</p>
    </header>

    <div class="section-title">
        <h2 style="font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;">Sugerencias del Catálogo</h2>
        <div class="line"></div>
    </div>

    <!-- AQUÍ SE MOSTRARÁN LOS PRODUCTOS DE TU FIREBASE -->
    <div id="contenedor-productos" class="grid-catalogo">
        <!-- Ejemplo de cómo se verá una tarjeta generada automáticamente -->
        <div class="card-producto">
            <h3>Pañalera</h3>
            <p style="font-size: 0.7rem; color: var(--gris-azul); margin-bottom: 10px;">PRECIO SUGERIDO</p>
            <div class="price-editor">
                <span>$</span>
                <input type="number" class="input-precio" value="1500">
            </div>
            <button class="btn-add">AÑADIR A MI MESA</button>
        </div>
    </div>
</div>

<script>
    <script>
    const db = firebase.firestore();
    const contenedor = document.getElementById('contenedor-productos');

    // AQUÍ ESTÁ EL PASO 1 (Cargar los datos)
    function cargarCatalogo() {
        db.collection("catalogo_maestro").doc("baby_shower").get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                const productos = data.productos;
                contenedor.innerHTML = '';
                productos.forEach((prod, index) => {
                    // Esta línea llama al Paso 2
                    crearTarjeta(prod, index);
                });
            }
        });
    }

    // --- AQUÍ PONES EL PASO 2 ---
    function crearTarjeta(prod, index) {
        const html = `
            <div class="card-producto">
                <h3>${prod.nombre}</h3>
                <p style="font-size: 0.7rem; color: var(--gris-azul); margin-bottom: 10px;">PRECIO SUGERIDO (LIVERPOOL)</p>
                <div class="price-editor">
                    <span>$</span>
                    <input type="number" 
                           id="precio-input-${index}" 
                           class="input-precio" 
                           value="${prod.precio}">
                </div>
                <button class="btn-add" onclick="guardarEnMiMesa('${prod.nombre}', ${index})">
                    AÑADIR A MI MESA
                </button>
            </div>
        `;
        contenedor.innerHTML += html;
    }

    // AQUÍ VA EL PASO 3 (La función del botón)
    function guardarEnMiMesa(nombreProducto, index) {
        const precioFinal = document.getElementById(`precio-input-${index}`).value;
        alert(`Has añadido "${nombreProducto}" por un valor de $${precioFinal} a tu mesa pública.`);
    }

    // IMPORTANTE: Al final de todo, llama a la función para que empiece a trabajar
    cargarCatalogo();
</script>

</body>
</html>
