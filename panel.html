<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Anfitrión - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo-marfil: #FAF7F2;
            --azul-profundo: #102A43;
            --beige-arena: #E9D8C4;
            --terracota: #C97B63;
            --gris-azul: #5C6770;
            --dorado: #C8A96B;
            --blanco: #ffffff;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--fondo-marfil); color: var(--azul-profundo); margin: 0; padding: 0; }
        
        header { background: var(--azul-profundo); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo-small { max-width: 70px; filter: brightness(0) invert(1); }
        .btn-salir { color: var(--dorado); border: 1px solid var(--dorado); background: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 0.7rem; }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        /* BANNER LINK CON DORADO */
        .share-banner { 
            background: var(--azul-profundo); 
            color: var(--blanco); 
            padding: 35px; 
            border-radius: 15px; 
            text-align: center;
            border-bottom: 5px solid var(--dorado);
            margin-bottom: 40px;
        }
        .numero-mesa-btn {
            background: var(--dorado);
            color: var(--azul-profundo);
            display: inline-block;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 2rem;
            font-weight: 600;
            margin: 15px 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .numero-mesa-btn:hover { background: var(--beige-arena); transform: scale(1.03); }

        /* NOTIFICACIONES EN BEIGE */
        #notificaciones-regalos { 
            background: var(--beige-arena); 
            padding: 25px; 
            border-radius: 15px; 
            margin-bottom: 30px; 
        }
        .notif-item { 
            background: var(--fondo-marfil); 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 12px; 
            border: 1px solid rgba(16, 42, 67, 0.1); 
        }

        /* TARJETAS DE GESTIÓN */
        .card-blanca { background: var(--blanco); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 25px; }
        
        .btn-accion { 
            background: var(--azul-profundo); color: white; border: none; padding: 12px 25px; 
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; 
        }
        .btn-accion:hover { background: var(--terracota); }

        h2, h3 { color: var(--azul-profundo); }
        .text-secundario { color: var(--gris-azul); font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" class="logo-small">
        <button class="btn-salir" onclick="cerrarSesion()">CERRAR SESIÓN</button>
    </header>

    <div class="container">
        <div class="share-banner">
            <span style="letter-spacing: 2px; font-size: 0.8rem; opacity: 0.8;">TU MESA DE REGALOS EXCLUSIVA</span><br>
            <div class="numero-mesa-btn" id="numero-mesa-display" onclick="copiarLink()">...</div>
            <p style="font-size: 0.8rem; color: var(--beige-arena);">Haz clic en el número para copiar tu link de invitados</p>
        </div>

        <div id="notificaciones-regalos">
            <h3 style="margin-top:0;">🎁 Mensajes Recibidos</h3>
            <div id="lista-notificaciones">
                <!-- Se llena con Firebase -->
            </div>
        </div>

        <div class="card-blanca">
            <h3>✨ Personalización</h3>
            <p class="text-secundario">Escribe el mensaje que verán tus invitados al entrar.</p>
            <textarea id="mensaje-bienvenida" rows="2" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--beige-arena);"></textarea>
            <button class="btn-accion" style="margin-top:10px;" onclick="guardarConfiguracion()">ACTUALIZAR MENSAJE</button>
        </div>
        
        <!-- Aquí sigue el resto de secciones de inventario con el mismo estilo -->
    </div>
    <!-- (El script de Firebase se mantiene igual al anterior) -->
</body>
</html>
