<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- SDK de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --fondo-marfil: #FAF7F2;
            --azul-profundo: #102A43;
            --dorado: #C8A96B;
            --terracota: #C97B63;
            --blanco: #ffffff;
            --gris-azul: #5C6770;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            background-color: var(--fondo-marfil); 
            display: flex;
            color: var(--azul-profundo);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background-color: var(--azul-profundo);
            height: 100vh;
            color: white;
            padding: 30px 20px;
            position: fixed;
            box-sizing: border-box;
        }
        .sidebar h2 { color: var(--dorado); font-size: 1.4rem; letter-spacing: 3px; margin-bottom: 40px; }
        .nav-links a { 
            display: block; color: white; text-decoration: none; 
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--dorado); }
        .btn-logout { 
            margin-top: 50px; background: none; border: 1px solid var(--terracota); 
            color: var(--terracota); padding: 12px; cursor: pointer; width: 100%;
            border-radius: 5px; font-weight: 600;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); box-sizing: border-box; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* --- CARDS DE ESTADÍSTICAS --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card-stats {
            background: var(--blanco); padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); border-left: 5px solid var(--dorado);
        }
        .card-stats h3 { margin: 0; color: var(--gris-azul); font-size: 0.9rem; text-transform: uppercase; }
        .card-stats p { font-size: 2.2rem; font-weight: 600; margin: 10px 0; }

        /* --- SECCIONES BLANCAS --- */
        .panel-section {
            background: var(--blanco); padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); margin-bottom: 30px;
        }
        .panel-section h3 { margin-top: 0; border-bottom: 1px solid var(--fondo-marfil); padding-bottom: 15px; }

        /* --- FORMULARIO --- */
        .grid-form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .panel-section input {
            width: 100%; padding: 12px; border: 1px solid #eee; 
            border-radius: 8px; box-sizing: border-box; outline: none;
        }
        .btn-add {
            background: var(--azul-profundo); color: white; border: none;
            padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
        }

        /* --- LISTADO DE REGALOS RECIBIDOS --- */
        .regalo-recibido-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #f9f9f9;
        }
        .regalo-recibido-item:last-child { border-bottom: none; }

        /* --- GRID DE REGALOS (INVENTARIO) --- */
        .inventario-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .item-card { background: var(--fondo-marfil); padding: 10px; border-radius: 10px; text-align: center; }
        .item-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; width: 100%; }
            .stats-grid, .grid-form { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ODARA</h2>
        <div class="nav-links">
            <a href="#">Panel Principal</a>
            <a href="#" id="btn-ver-mesa" target="_blank">Ver mi Mesa Pública</a>
            <a href="#">Configuración</a>
        </div>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <div class="header-panel">
            <h1 id="txt-bienvenida">Bienvenida</h1>
            <span id="id-mesa-badge" style="background: var(--dorado); color: white; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;">ID: ---</span>
        </div>

        <!-- 1. RESUMEN DE DINERO Y REGALOS -->
        <div class="stats-grid">
            <div class="card-stats">
                <h3>Total Recaudado</h3>
                <p id="total-monto" style="color: var(--azul-profundo);">$0.00</p>
            </div>
            <div class="card-stats" style="border-left-color: var(--terracota);">
                <h3>Invitados que regalaron</h3>
                <p id="total-invitados" style="color: var(--terracota);">0</p>
            </div>
        </div>

        <!-- 2. MURO DE REGALOS RECIBIDOS (NUEVO) -->
        <div class="panel-section">
            <h3>Actividad Reciente</h3>
            <div id="muro-actividad">
                <p style="color: var(--gris-azul); text-align: center;">Buscando regalos recibidos...</p>
            </div>
        </div>

        <!-- 3. GESTOR DE INVENTARIO -->
        <div class="panel-section">
            <h3>Añadir Nuevo Regalo a la Lista</h3>
            <div class="grid-form">
                <input type="text" id="add-nombre" placeholder="Producto (ej: Cafetera)">
                <input type="number" id="add-precio" placeholder="Precio MXN">
                <input type="text" id="add-imagen" placeholder="URL de la imagen">
            </div>
            <button class="btn-add" onclick="subirNuevoProducto()">Guardar Producto</button>
        </div>

        <!-- 4. VISTA PREVIA DE TU LISTA -->
        <div class="panel-section">
            <h3>Mi Lista de Deseos</h3>
            <div class="inventario-grid" id="inventario-lista">
                <!-- Se carga dinámicamente -->
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN OFICIAL ODARA-15D63
        const firebaseConfig = {
            apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
            authDomain: "odara-15d63.firebaseapp.com",
            projectId: "odara-15d63",
            storageBucket: "odara-15d63.firebasestorage.app",
            messagingSenderId: "574365543873",
            appId: "1:574365543873:web:d55ad62b17231e39e89340",
            measurementId: "G-0LYV3GE6KK"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let mesaIdGlobal = "";

        // CONTROL DE ACCESO
        auth.onAuthStateChanged(user => {
            if (user) {
                obtenerDatosMesa(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        function obtenerDatosMesa(uid) {
            db.collection("mesas_publicas").where("dueno_id", "==", uid).get()
            .then(querySnapshot => {
                querySnapshot.forEach(doc => {
                    mesaIdGlobal = doc.id;
                    const data = doc.data();
                    
                    document.getElementById('txt-bienvenida').innerText = "Hola, " + data.nombres;
                    document.getElementById('id-mesa-badge').innerText = "Mesa ID: " + mesaIdGlobal;
                    document.getElementById('btn-ver-mesa').href = "mesa.html?id=" + mesaIdGlobal;

                    cargarRegalosRecibidos();
                    cargarMiInventario();
                });
            });
        }

        // FUNCIÓN CLAVE: Ver quién regaló
        function cargarRegalosRecibidos() {
            const muro = document.getElementById('muro-actividad');
            const txtMonto = document.getElementById('total-monto');
            const txtCant = document.getElementById('total-invitados');
            
            let totalAcumulado = 0;
            let totalPersonas = 0;

            db.collection("mesas_publicas").doc(mesaIdGlobal).collection("regalos_recibidos")
            .orderBy("fecha", "desc").onSnapshot(snapshot => {
                if (snapshot.empty) {
                    muro.innerHTML = "<p style='text-align:center; color:#ccc;'>Aún no tienes regalos registrados.</p>";
                    return;
                }

                muro.innerHTML = "";
                totalAcumulado = 0;
                totalPersonas = 0;

                snapshot.forEach(doc => {
                    const regalo = doc.data();
                    totalAcumulado += regalo.monto;
                    totalPersonas++;

                    muro.innerHTML += `
                        <div class="regalo-recibido-item">
                            <div>
                                <strong style="color:var(--azul-profundo);">${regalo.nombre_invitado}</strong>
                                <p style="margin:4px 0; font-size:0.8rem; color:var(--gris-azul);">"${regalo.mensaje}"</p>
                            </div>
                            <div style="text-align:right;">
                                <span style="color:var(--terracota); font-weight:600;">+$${regalo.monto}</span>
                            </div>
                        </div>
                    `;
                });

                txtMonto.innerText = `$${totalAcumulado.toLocaleString()} MXN`;
                txtCant.innerText = totalPersonas;
            });
        }

        // GESTIÓN DE PRODUCTOS
        function subirNuevoProducto() {
            const nombre = document.getElementById('add-nombre').value;
            const precio = document.getElementById('add-precio').value;
            const imagen = document.getElementById('add-imagen').value;

            if(!nombre || !precio || !imagen) return alert("Llena todos los campos.");

            db.collection("mesas_publicas").doc(mesaIdGlobal).collection("regalos").add({
                nombre: nombre,
                precio: Number(precio),
                imagen: imagen,
                creado: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("¡Regalo añadido!");
                document.getElementById('add-nombre').value = "";
                document.getElementById('add-precio').value = "";
                document.getElementById('add-imagen').value = "";
                cargarMiInventario();
            });
        }

        function cargarMiInventario() {
            const lista = document.getElementById('inventario-lista');
            db.collection("mesas_publicas").doc(mesaIdGlobal).collection("regalos").get().then(snapshot => {
                lista.innerHTML = "";
                snapshot.forEach(doc => {
                    const item = doc.data();
                    lista.innerHTML += `
                        <div class="item-card">
                            <img src="${item.imagen}">
                            <p style="font-size:0.8rem; margin:10px 0 5px;">${item.nombre}</p>
                            <strong style="color:var(--dorado);">$${item.precio}</strong>
                        </div>
                    `;
                });
            });
        }

        function cerrarSesion() {
            auth.signOut().then(() => window.location.href = "login.html");
        }
    </script>
</body>
</html>
