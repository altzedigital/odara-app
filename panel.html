<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel de Control | Odara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #FAF7F2; }
        .font-serif { font-family: 'Cinzel', serif; }
        .bg-odara-blue { background-color: #102A43; }
        .text-odara-blue { color: #102A43; }
        .bg-odara-gold { background-color: #C8A96B; }
        .text-odara-gold { color: #C8A96B; }
        .border-odara-gold { border-color: #C8A96B; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <header class="bg-white shadow-sm border-b border-gray-100 py-6 px-8 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 id="titulo-bienvenida" class="font-serif text-2xl text-odara-blue uppercase tracking-widest">Mi Mesa de Regalos</h1>
            <p id="codigo-mesa" class="text-xs text-gray-400 font-semibold tracking-wider uppercase mt-1">Cargando código...</p>
        </div>
        <button id="btn-cerrar" class="text-xs font-semibold uppercase tracking-wider text-red-500 hover:text-red-700 transition">Cerrar Sesión</button>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-odara-gold">
                <h2 class="font-serif text-lg text-odara-blue uppercase tracking-wider mb-4">Crear Regalo Propio</h2>
                <form id="form-regalo-propio" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Nombre del Regalo</label>
                        <input type="text" id="propio-nombre" required placeholder="Ej. Cafetera Espresso Premium" class="w-full p-2.5 border border-gray-200 rounded-lg outline-none text-sm focus:border-odara-gold bg-white">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Precio ($ MXN)</label>
                            <input type="number" id="propio-precio" required placeholder="2500" class="w-full p-2.5 border border-gray-200 rounded-lg outline-none text-sm focus:border-odara-gold bg-white">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1">¿Cuántos deseas?</label>
                            <input type="number" id="propio-cantidad" value="1" min="1" required class="w-full p-2.5 border border-gray-200 rounded-lg outline-none text-sm text-center focus:border-odara-gold bg-white">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Subir Foto del Regalo</label>
                        <input type="file" id="propio-foto-file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-gray-100 file:text-odara-blue hover:file:bg-gray-200 cursor-pointer">
                    </div>
                    <button type="submit" id="btn-submit-propio" class="w-full bg-odara-blue text-white py-3 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-slate-800 transition disabled:opacity-50">Añadir a mi Lista</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md">
                <h2 class="font-serif text-lg text-odara-blue uppercase tracking-wider mb-1">Ideas de Regalos</h2>
                <p class="text-[11px] text-gray-400 uppercase tracking-wide mb-4">Sugeridos por Odara</p>
                
                <div class="space-y-3 max-h-96 overflow-y-auto pr-1">
                    <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border border-gray-100">
                        <div class="w-12 h-12 bg-gray-200 rounded-lg flex-shrink-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=150')"></div>
                        <div class="flex-grow">
                            <h4 class="text-xs font-semibold text-gray-700">Fondo Luna de Miel</h4>
                            <p class="text-[11px] text-odara-gold font-mono font-bold">$10,000 MXN</p>
                        </div>
                        <button onclick="agregarDesdeCatalogo('Fondo Luna de Miel', 10000, 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600')" class="bg-odara-gold text-white text-[10px] uppercase font-bold px-3 py-2 rounded-md hover:bg-amber-700 transition">+</button>
                    </div>

                    <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border border-gray-100">
                        <div class="w-12 h-12 bg-gray-200 rounded-lg flex-shrink-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1595231712425-60d3ad350243?w=150')"></div>
                        <div class="flex-grow">
                            <h4 class="text-xs font-semibold text-gray-700">Cena Romántica</h4>
                            <p class="text-[11px] text-odara-gold font-mono font-bold">$2,500 MXN</p>
                        </div>
                        <button onclick="agregarDesdeCatalogo('Cena Romántica', 2500, 'https://images.unsplash.com/photo-1595231712425-60d3ad350243?w=600')" class="bg-odara-gold text-white text-[10px] uppercase font-bold px-3 py-2 rounded-md hover:bg-amber-700 transition">+</button>
                    </div>
                </div>
            </div>

        </div>

        <div class="lg:col-span-2 bg-white p-6 md:p-8 rounded-2xl shadow-md">
            <h2 class="font-serif text-xl text-odara-blue uppercase tracking-wider mb-6">Mi Lista de Regalos Actual</h2>
            
            <div id="contenedor-regalos" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <p class="text-xs text-gray-400 col-span-2 text-center py-8">Aún no has agregado regalos a tu lista.</p>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, collection, addDoc, onSnapshot, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        // Importación de Firebase Storage v10
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
            authDomain: "odara-15d63.firebaseapp.com",
            projectId: "odara-15d63",
            storageBucket: "odara-15d63.firebasestorage.app",
            messagingSenderId: "574365543873",
            appId: "1:574365543873:web:d55ad62b17231e39e89340"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app); // Inicialización del servicio de almacenamiento

        let uidUsuarioActual = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uidUsuarioActual = user.uid;
                
                const docRef = doc(db, "mesas_publicas", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    document.getElementById('titulo-bienvenida').innerText = `Mesa de ${docSnap.data().nombres}`;
                    document.getElementById('codigo-mesa').innerText = `Evento Oficial No. ${docSnap.data().id_mesa}`;
                }
                
                escucharRegalosMesa(user.uid);
            } else {
                window.location.href = 'registro.html';
            }
        });

        function escucharRegalosMesa(uid) {
            const regalosRef = collection(db, "mesas_publicas", uid, "regalos");
            onSnapshot(regalosRef, (snapshot) => {
                const contenedor = document.getElementById('contenedor-regalos');
                contenedor.innerHTML = "";

                if (snapshot.empty) {
                    contenedor.innerHTML = `<p class="text-xs text-gray-400 col-span-2 text-center py-8">Tu lista está vacía. ¡Agrega tu primer regalo a la izquierda!</p>`;
                    return;
                }

                snapshot.forEach((docRegalo) => {
                    const datos = docRegalo.data();
                    const card = document.createElement('div');
                    card.className = "border border-gray-100 rounded-xl overflow-hidden shadow-sm bg-white flex flex-col justify-between";
                    card.innerHTML = `
                        <div class="h-32 bg-gray-200 bg-cover bg-center" style="background-image: url('${datos.foto || 'https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=500'}')"></div>
                        <div class="p-4 flex-grow flex flex-col justify-between">
                            <div>
                                <h3 class="text-xs font-bold text-gray-700 uppercase tracking-wide truncate">${datos.nombre}</h3>
                                <p class="text-sm font-mono text-odara-gold font-bold mt-1">$${Number(datos.precio).toLocaleString('es-MX')} MXN</p>
                            </div>
                            <div class="mt-4 pt-3 border-t border-gray-50 flex justify-between items-center text-[11px] text-gray-500">
                                <span>Solicitados: <strong>${datos.cantidad_solicitada}</strong></span>
                                <span>Recibidos: <strong class="text-emerald-600">${datos.cantidad_recibida || 0}</strong></span>
                            </div>
                            <button onclick="eliminarRegalo('${docRegalo.id}')" class="w-full text-center text-[10px] text-red-400 uppercase font-semibold tracking-wider mt-3 hover:text-red-600 transition">Eliminar</button>
                        </div>
                    `;
                    contenedor.appendChild(card);
                });
            });
        }

        // ACCIÓN: SUBIR IMAGEN A STORAGE Y GUARDAR EN FIRESTORE
        document.getElementById('form-regalo-propio').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!uidUsuarioActual) return;

            const btnSubmit = document.getElementById('btn-submit-propio');
            const nombre = document.getElementById('propio-nombre').value.trim();
            const precio = parseFloat(document.getElementById('propio-precio').value);
            const cantidad = parseInt(document.getElementById('propio-cantidad').value);
            const archivoFoto = document.getElementById('propio-foto-file').files[0];

            let fotoUrlFinal = ""; // Link por defecto si no suben nada

            try {
                btnSubmit.disabled = true;
                btnSubmit.innerText = "SUBIENDO IMAGEN...";

                // Si seleccionaron un archivo, lo procesamos y subimos a Firebase Storage
                if (archivoFoto) {
                    // Creamos una ruta única: regalos / ID_USUARIO / tiempo_nombre_archivo
                    const rutaStorage = `regalos/${uidUsuarioActual}/${Date.now()}_${archivoFoto.name}`;
                    const storageRef = ref(storage, rutaStorage);
                    
                    // Subimos los bytes del archivo
                    await uploadBytes(storageRef, archivoFoto);
                    // Obtenemos su URL pública segura de descarga
                    fotoUrlFinal = await getDownloadURL(storageRef);
                }

                // Guardamos el registro completo en Firestore
                await addDoc(collection(db, "mesas_publicas", uidUsuarioActual, "regalos"), {
                    nombre: nombre,
                    precio: precio,
                    cantidad_solicitada: cantidad,
                    cantidad_recibida: 0,
                    foto: fotoUrlFinal, // El link de Firebase Storage o vacío
                    fecha_agregado: new Date()
                });

                document.getElementById('form-regalo-propio').reset();
                document.getElementById('propio-cantidad').value = 1;
            } catch (error) {
                console.error("Error crítico al subir imagen o guardar regalo:", error);
                alert("Tuvimos un problema al subir tu archivo. Verifica que la consola de Storage esté activa en modo de prueba.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "AÑADIR A MI LISTA";
            }
        });

        // ACCIÓN DEL CATÁLOGO PRE-HECHO (Sigue usando los links seguros de Unsplash que tú definas)
        window.agregarDesdeCatalogo = async function(nombreSugerido, precioSugerido, fotoSugerida) {
            if (!uidUsuarioActual) return;

            const nuevoPrecio = prompt(`¿Quieres cambiar el precio sugerido para "${nombreSugerido}"?`, precioSugerido);
            if (nuevoPrecio === null) return; 

            const nuevaCantidad = prompt(`¿Cuántas unidades de "${nombreSugerido}" deseas pedir en tu mesa?`, "1");
            if (nuevaCantidad === null) return; 

            try {
                await addDoc(collection(db, "mesas_publicas", uidUsuarioActual, "regalos"), {
                    nombre: nombreSugerido,
                    precio: parseFloat(nuevoPrecio) || precioSugerido,
                    cantidad_solicitada: parseInt(nuevaCantidad) || 1,
                    cantidad_recibida: 0,
                    foto: fotoSugerida,
                    fecha_agregado: new Date()
                });
            } catch (error) {
                console.error("Error al copiar del catálogo:", error);
            }
        };

        window.eliminarRegalo = async function(idRegalo) {
            if (!uidUsuarioActual) return;
            if (confirm("¿Estás seguro de que deseas quitar este regalo de tu mesa?")) {
                await deleteDoc(doc(db, "mesas_publicas", uidUsuarioActual, "regalos", idRegalo));
            }
        };

        document.getElementById('btn-cerrar').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'registro.html');
        });
    </script>
</body>
</html>
