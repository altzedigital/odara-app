<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Odara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #FAF7F2; }
        .font-serif { font-family: 'Cinzel', serif; }
        .bg-odara-blue { background-color: #102A43; }
        .text-odara-blue { color: #102A43; }
        .bg-odara-gold { background-color: #C8A96B; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 max-w-md w-full text-center">
        <h1 class="font-serif text-3xl text-odara-blue uppercase tracking-widest mb-2">Odara</h1>
        <p class="text-xs text-gray-400 uppercase tracking-wider mb-8">Mesa de Regalos Premium</p>

        <div class="flex border-b border-gray-100 mb-6 text-xs font-bold uppercase tracking-wider">
            <button id="tab-login" class="w-1/2 pb-3 border-b-2 border-odara-blue text-odara-blue">Iniciar Sesión</button>
            <button id="tab-register" class="w-1/2 pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600">Registrarme</button>
        </div>

        <form id="auth-form" class="space-y-4 text-left">
            <div id="campo-nombre" class="hidden">
                <label class="block text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Nombre Completo</label>
                <input type="text" id="auth-nombre" class="w-full p-3 border border-gray-200 rounded-lg outline-none text-sm focus:border-odara-gold">
            </div>
            <div>
                <label class="block text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Correo Electrónico</label>
                <input type="email" id="auth-correo" required class="w-full p-3 border border-gray-200 rounded-lg outline-none text-sm focus:border-odara-gold">
            </div>
            <div>
                <label class="block text-[11px] font-semibold uppercase tracking-wider text-gray-500 mb-1">Contraseña</label>
                <input type="password" id="auth-password" required class="w-full p-3 border border-gray-200 rounded-lg outline-none text-sm focus:border-odara-gold">
            </div>

            <div id="contenedor-olvido" class="text-right">
                <button type="button" id="btn-olvide-pass" class="text-[11px] font-semibold text-gray-400 hover:text-odara-blue transition">¿Olvidaste tu contraseña?</button>
            </div>

            <button type="submit" id="btn-submit-auth" class="w-full bg-odara-blue text-white py-3.5 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-slate-800 transition">Entrar al Panel</button>
        </form>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
            <div class="relative flex justify-center text-xs uppercase tracking-wider"><span class="bg-white px-3 text-gray-400 text-[10px] font-bold">O también puedes</span></div>
        </div>

        <button id="btn-google" class="w-full border border-gray-200 bg-white text-gray-600 py-3 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-gray-50 transition flex items-center justify-center gap-2">
            <svg class="w-4 h-4" viewBox="0 0 24 24">
                <path fill="#EA4335" d="M12 5.04c1.64 0 3.12.56 4.28 1.67l3.2-3.2C17.52 1.58 14.96 1 12 1 7.35 1 3.4 3.65 1.5 7.5l3.6 2.8C6.06 6.92 8.77 5.04 12 5.04z"/>
                <path fill="#4285F4" d="M23.5 12.25c0-.82-.07-1.6-.2-2.35H12v4.45h6.45c-.27 1.44-1.08 2.66-2.3 3.48l3.6 2.8c2.1-1.94 3.3-4.8 3.3-8.38z"/>
                <path fill="#FBBC05" d="M5.1 14.7c-.24-.72-.38-1.49-.38-2.3s.14-1.58.38-2.3L1.5 7.3C.54 9.22 0 11.35 0 13.6s.54 4.38 1.5 6.3l3.6-2.8l-.02-.4z"/>
                <path fill="#34A853" d="M12 23c3.24 0 5.97-1.08 7.96-2.92l-3.6-2.8c-1.1.74-2.52 1.18-4.36 1.18c-3.23 0-5.94-1.88-6.92-4.46L1.48 16.8C3.38 20.35 7.33 23 12 23z"/>
            </svg>
            Acceder con Google
        </button>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // Importamos Auth con Google y Reset de Contraseña
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
            authDomain: "odara-15d63.firebaseapp.com",
            projectId: "odara-15d63",
            storageBucket: "odara-15d63.firebasestorage.app",
            messagingSenderId: "574365543873",
            appId: "1:574365543873:web:d55ad62b17231e39e89340"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        let modoActual = "LOGIN"; // Puede ser LOGIN o REGISTER

        // CONTROL DE PESTAÑAS (SWITCHER)
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const campoNombre = document.getElementById('campo-nombre');
        const contenedorOlvido = document.getElementById('contenedor-olvido');
        const btnSubmit = document.getElementById('btn-submit-auth');

        tabLogin.addEventListener('click', () => {
            modoActual = "LOGIN";
            tabLogin.className = "w-1/2 pb-3 border-b-2 border-odara-blue text-odara-blue";
            tabRegister.className = "w-1/2 pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600";
            campoNombre.classList.add('hidden');
            contenedorOlvido.classList.remove('hidden');
            btnSubmit.innerText = "ENTRAR AL PANEL";
            document.getElementById('auth-nombre').required = false;
        });

        tabRegister.addEventListener('click', () => {
            modoActual = "REGISTER";
            tabRegister.className = "w-1/2 pb-3 border-b-2 border-odara-blue text-odara-blue";
            tabLogin.className = "w-1/2 pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600";
            campoNombre.classList.remove('hidden');
            contenedorOlvido.classList.add('hidden');
            btnSubmit.innerText = "CREAR MI MESA";
            document.getElementById('auth-nombre').required = true;
        });

        // FUNCIÓN AUXILIAR: GENERAR NÚMERO DE MESA CON NUESTRO CONTADOR CONCURRENTE
        async function obtenerSiguienteNumeroMesa() {
            const contadorRef = doc(db, "ajustes", "contador_mesas");
            try {
                return await runTransaction(db, async (transaction) => {
                    const contadorDoc = await transaction.get(contadorRef);
                    if (!contadorDoc.exists()) {
                        transaction.set(contadorRef, { siguiente_id: 2001 });
                        return 2001;
                    }
                    const nuevoId = contadorDoc.data().siguiente_id;
                    transaction.update(contadorRef, { siguiente_id: nuevoId + 1 });
                    return nuevoId;
                });
            } catch (e) {
                console.error("Error en transacción de ID:", e);
                return Math.floor(1000 + Math.random() * 9000); // Respaldo aleatorio por seguridad
            }
        }

        // ACCIÓN PRINCIPAL DEL FORMULARIO (LOGIN O REGISTRO TRADICIONAL)
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-correo').value.trim();
            const password = document.getElementById('auth-password').value;
            const nombre = document.getElementById('auth-nombre').value.trim();

            if (modoActual === "REGISTER") {
                try {
                    // 1. Crear el usuario en Firebase Auth
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // 2. Obtener el ID numérico único del evento
                    const numeroMesa = await obtenerSiguienteNumeroMesa();

                    // 3. SE ASIGNA EL DOCUMENTO USANDO EL "USER.UID" EXACTO
                    await setDoc(doc(db, "mesas_publicas", user.uid), {
                        nombres: nombre,
                        correo: email,
                        id_mesa: numeroMesa,
                        fecha_registro: new Date()
                    });

                    window.location.href = 'panel.html';
                } catch (error) {
                    console.error(error);
                    alert("Error al registrarse: " + error.message);
                }
            } else {
                // MODO LOGIN TRADICIONAL
                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // Validamos si tiene su documento ligado correctamente
                    const docSnap = await getDoc(doc(db, "mesas_publicas", user.uid));
                    if (docSnap.exists()) {
                        window.location.href = 'panel.html';
                    } else {
                        alert("Tu cuenta no tiene una mesa asignada en Firestore. Contacta a soporte.");
                    }
                } catch (error) {
                    console.error(error);
                    alert("Credenciales incorrectas o error de acceso.");
                }
            }
        });

        // ACCIÓN: INICIAR SESIÓN O REGISTRARSE CON GOOGLE
        document.getElementById('btn-google').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                // Verificamos si este usuario de Google ya tenía mesa creada
                const docRef = doc(db, "mesas_publicas", user.uid);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    // Si es la primera vez que entra con Google, le generamos su mesa automáticamente
                    const numeroMesa = await obtenerSiguienteNumeroMesa();
                    await setDoc(docRef, {
                        nombres: user.displayName || "Festejado Odara",
                        correo: user.email,
                        id_mesa: numeroMesa,
                        fecha_registro: new Date()
                    });
                }

                window.location.href = 'panel.html';
            } catch (error) {
                console.error("Error con Google Auth:", error);
                alert("Hubo un problema al conectar con Google.");
            }
        });

        // ACCIÓN: RESTABLECER CONTRASEÑA (OLVIDÉ MI CONTRASEÑA)
        document.getElementById('btn-olvide-pass').addEventListener('click', async () => {
            const email = document.getElementById('auth-correo').value.trim();
            if (!email) {
                alert("Por favor, escribe primero tu correo electrónico en el campo correspondiente para enviarte el enlace de recuperación.");
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert(`¡Correo enviado! Revisa la bandeja de entrada o spam de ${email} para restablecer tu contraseña.`);
            } catch (error) {
                console.error("Error al enviar reset de contraseña:", error);
                alert("No pudimos enviar el correo de recuperación. Verifica que esté bien escrito.");
            }
        });
    </script>
</body>
    </html>
</html>
