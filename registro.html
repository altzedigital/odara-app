<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear mi Mesa - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- SDK de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --fondo-marfil: #FAF7F2;
            --azul-profundo: #102A43;
            --beige-arena: #E9D8C4;
            --terracota: #C97B63;
            --gris-azul: #5C6770;
            --dorado: #C8A96B;
            --blanco: #ffffff;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--fondo-marfil); 
            color: var(--azul-profundo); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            padding: 20px 5%; 
            text-align: center; 
            background: var(--blanco);
            border-bottom: 1px solid var(--beige-arena);
        }
        .logo { max-width: 80px; }

        .main-auth {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: var(--blanco);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(16, 42, 67, 0.05);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid var(--dorado);
        }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { font-size: 1.8rem; margin-bottom: 10px; color: var(--azul-profundo); }
        .auth-header p { color: var(--gris-azul); font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-weight: 600; 
            font-size: 0.75rem; 
            color: var(--gris-azul); 
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .input-auth {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--beige-arena);
            border-radius: 8px;
            background-color: var(--fondo-marfil);
            font-family: inherit;
            color: var(--azul-profundo);
            box-sizing: border-box;
            transition: 0.3s;
        }
        .input-auth:focus {
            outline: none;
            border-color: var(--terracota);
            box-shadow: 0 0 0 3px rgba(201, 123, 99, 0.1);
        }

        .btn-registro {
            width: 100%;
            background-color: var(--azul-profundo);
            color: var(--blanco);
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            margin-top: 10px;
            font-size: 1rem;
        }
        .btn-registro:hover {
            background-color: var(--terracota);
            transform: translateY(-1px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--gris-azul);
        }
        .auth-footer a {
            color: var(--terracota);
            text-decoration: none;
            font-weight: 600;
        }

        .decor {
            width: 40px;
            height: 2px;
            background: var(--dorado);
            margin: 20px auto;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html">
        <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" alt="Odara Logo" class="logo">
    </a>
</header>

<main class="main-auth">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Únete a Odara</h2>
            <p>Comienza a crear una experiencia inolvidable para tu evento.</p>
            <div class="decor"></div>
        </div>

        <form id="registro-form">
            <div class="form-group">
                <label>Nombre del Evento (o nombre de los festejados)</label>
                <input type="text" id="nombre-evento" class="input-auth" placeholder="Ej. Boda de Ana y Juan" required>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" class="input-auth" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" class="input-auth" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="form-group">
                <label>Tipo de Evento</label>
                <select id="tipo-evento" class="input-auth" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="baby-shower">Baby Shower</option>
                    <option value="boda">Boda</option>
                    <option value="cumpleaños">Cumpleaños</option>
                    <option value="otro">Otro Momento Especial</option>
                </select>
            </div>

            <button type="submit" class="btn-registro">CREAR MI CUENTA</button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión aquí</a>
        </div>
    </div>
</main>

<footer style="background: var(--azul-profundo); padding: 20px; text-align: center; color: var(--fondo-marfil); font-size: 0.7rem;">
    © 2026 Odara. Elegancia en cada detalle.
</footer>

<script>
    // Configuración de tu Firebase (Pega aquí tus credenciales reales)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_DOMINIO.firebaseapp.com",
        projectId: "TU_PROJECT_ID",
        storageBucket: "TU_BUCKET.appspot.com",
        messagingSenderId: "TU_SENDER_ID",
        appId: "TU_APP_ID"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Función para convertir "Boda de Ana" en "boda-de-ana" (ID Amigable)
    function generarIDAmigable(texto) {
        return texto
            .toString()
            .toLowerCase()
            .trim()
            .replace(/\s+/g, '-')      
            .replace(/[^\w\-]+/g, '')   
            .replace(/\-\-+/g, '-')
            .replace(/^-+/, '')         
            .replace(/-+$/, '');
    }

    // Lógica del Formulario
    document.getElementById('registro-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const nombreEventoOriginal = document.getElementById('nombre-evento').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const tipoEvento = document.getElementById('tipo-evento').value;

        try {
            // 1. Crear usuario en Firebase Auth
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // 2. Generar datos automáticos para la Mesa
            const idMesaAmigable = generarIDAmigable(nombreEventoOriginal);
            const numeroEvento = Math.floor(100 + Math.random() * 999); // 3 dígitos

            // 3. Crear el Documento en 'mesas_publicas' de forma automática
            // Usamos el idMesaAmigable como el Nombre del Documento
            await db.collection("mesas_publicas").doc(idMesaAmigable).set({
                numero_evento: numeroEvento,
                nombre_evento: nombreEventoOriginal,
                tipo_evento: tipoEvento,
                anfitrion_email: email,
                anfitrion_uid: user.uid,
                activa: true,
                mensaje_bienvenida: `¡Bienvenidos a nuestro ${tipoEvento}!`,
                fecha_creacion: firebase.firestore.FieldValue.serverTimestamp()
            });

            // 4. Guardar perfil básico del usuario
            await db.collection("usuarios").doc(user.uid).set({
                email: email,
                id_mesa: idMesaAmigable,
                numero_evento: numeroEvento
            });

            alert(`¡Cuenta creada con éxito!\nTu número de evento es: ${numeroEvento}\nTu link es: odara.mx/${idMesaAmigable}`);
            
            // Redirigir al panel
            window.location.href = "panel.html";

        } catch (error) {
            console.error("Error en registro: ", error);
            alert("Error: " + error.message);
        }
    });
</script>

</body>
</html>
