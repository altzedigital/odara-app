<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear mi Mesa - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- SDK de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --fondo-marfil: #FAF7F2;
            --azul-profundo: #102A43;
            --beige-arena: #E9D8C4;
            --terracota: #C97B63;
            --gris-azul: #5C6770;
            --dorado: #C8A96B;
            --blanco: #ffffff;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--fondo-marfil); 
            color: var(--azul-profundo); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            padding: 20px 5%; 
            text-align: center; 
            background: var(--blanco);
            border-bottom: 1px solid var(--beige-arena);
        }
        .logo { max-width: 80px; }

        .main-auth {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: var(--blanco);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(16, 42, 67, 0.05);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid var(--dorado);
        }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { font-size: 1.8rem; margin-bottom: 10px; color: var(--azul-profundo); }
        .auth-header p { color: var(--gris-azul); font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-weight: 600; 
            font-size: 0.75rem; 
            color: var(--gris-azul); 
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .input-auth {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--beige-arena);
            border-radius: 8px;
            background-color: var(--fondo-marfil);
            font-family: inherit;
            color: var(--azul-profundo);
            box-sizing: border-box;
            transition: 0.3s;
        }
        .input-auth:focus {
            outline: none;
            border-color: var(--terracota);
            box-shadow: 0 0 0 3px rgba(201, 123, 99, 0.1);
        }

        .btn-registro {
            width: 100%;
            background-color: var(--azul-profundo);
            color: var(--blanco);
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            margin-top: 10px;
            font-size: 1rem;
        }
        .btn-registro:hover {
            background-color: var(--terracota);
            transform: translateY(-1px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--gris-azul);
        }
        .auth-footer a {
            color: var(--terracota);
            text-decoration: none;
            font-weight: 600;
        }

        .decor {
            width: 40px;
            height: 2px;
            background: var(--dorado);
            margin: 20px auto;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html">
        <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" alt="Odara Logo" class="logo">
    </a>
</header>

<main class="main-auth">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Únete a Odara</h2>
            <p>Comienza a crear una experiencia inolvidable para tu evento.</p>
            <div class="decor"></div>
        </div>

        <form id="registro-form">
            <div class="form-group">
                <label>Nombre del Evento (o festejados)</label>
                <input type="text" id="nombre-evento" class="input-auth" placeholder="Ej. Boda de Ana y Juan" required>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" class="input-auth" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" class="input-auth" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="form-group">
                <label>Tipo de Evento</label>
                <select id="tipo-evento" class="input-auth" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="baby-shower">Baby Shower</option>
                    <option value="boda">Boda</option>
                    <option value="cumpleaños">Cumpleaños</option>
                    <option value="otro">Otro Momento Especial</option>
                </select>
            </div>

            <button type="submit" id="btn-submit" class="btn-registro">CREAR MI CUENTA</button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión aquí</a>
        </div>
    </div>
</main>

<footer style="background: var(--azul-profundo); padding: 20px; text-align: center; color: var(--fondo-marfil); font-size: 0.7rem;">
    © 2026 Odara. Elegancia en cada detalle.
</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
        authDomain: "odara-15d63.firebaseapp.com",
        projectId: "odara-15d63",
        storageBucket: "odara-15d63.firebasestorage.app",
        messagingSenderId: "574365543873",
        appId: "1:574365543873:web:d55ad62b17231e39e89340",
        measurementId: "G-0LYV3GE6KK"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 1. FUNCIÓN PARA GENERAR ID DE 6 DÍGITOS ÚNICO
    async function generarIDMesaUnico() {
        let idGenerado;
        let existe = true;

        while (existe) {
            idGenerado = Math.floor(100000 + Math.random() * 900000);
            const snapshot = await db.collection("mesas_publicas")
                                     .where("id_mesa", "==", idGenerado)
                                     .get();
            if (snapshot.empty) {
                existe = false; 
            }
        }
        return idGenerado;
    }

    // 2. FUNCIÓN PARA EL SLUG (URL AMIGABLE)
    function generarIDAmigable(texto) {
        return texto.toString().toLowerCase().trim()
            .replace(/\s+/g, '-').replace(/[^\w\-]+/g, '')
            .replace(/\-\-+/g, '-').replace(/^-+/, '').replace(/-+$/, '');
    }

    // 3. LÓGICA DEL FORMULARIO
    document.getElementById('registro-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.innerText = "CREANDO...";
        btn.disabled = true;

        const nombreEventoOriginal = document.getElementById('nombre-evento').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const tipoEvento = document.getElementById('tipo-evento').value;

        try {
            // A. Crear usuario en Auth
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // B. Generar ID de 6 dígitos único
            const idMesaNumerico = await generarIDMesaUnico();
            const slugAmigable = generarIDAmigable(nombreEventoOriginal);

            // C. Crear documento en 'mesas_publicas'
            // Usamos el UID del usuario como nombre del documento para orden total
            await db.collection("mesas_publicas").doc(user.uid).set({
                id_mesa: idMesaNumerico, // El número de 6 dígitos
                id_amigable: slugAmigable, // Para la URL opcional
                nombres: nombreEventoOriginal,
                tipo_evento: tipoEvento,
                dueno_id: user.uid,
                email: email,
                activa: true,
                fecha_creacion: firebase.firestore.FieldValue.serverTimestamp()
            });

            // D. Guardar en colección de usuarios (respaldo)
            await db.collection("usuarios").doc(user.uid).set({
                email: email,
                id_mesa: idMesaNumerico,
                rol: "anfitrion"
            });

            alert(`¡Bienvenida a Odara!\nTu número de evento es: ${idMesaNumerico}`);
            window.location.href = "panel.html";

        } catch (error) {
            console.error(error);
            alert("Error: " + error.message);
            btn.innerText = "CREAR MI CUENTA";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
