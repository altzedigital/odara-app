<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primario: #d4a373; --fondo: #fefae0; --texto: #4a4a4a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--fondo); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-registro { width: 100%; background: var(--primario); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" style="width: 80px; margin-bottom: 20px;">
    <h2>Crea tu cuenta</h2>
    <input type="text" id="nombre" placeholder="Tu nombre">
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="tel" id="whatsapp" placeholder="WhatsApp (Ej: 521XXXXXXXXXX)">
    <small style="font-size: 0.7rem; color: #999;">Incluye código de país sin el signo +</small>
    <input type="password" id="password" placeholder="Contraseña">
    <button class="btn-registro" onclick="registrarUsuario()">Empezar mi Mesa</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWnfMUmraJsnu4iPpoSlEJbdsORHWoyH4",
        authDomain: "odara-15d63.firebaseapp.com",
        projectId: "odara-15d63",
        storageBucket: "odara-15d63.firebasestorage.app",
        messagingSenderId: "574365543873",
        appId: "1:574365543873:web:d55ad62b17231e39e89340"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.registrarUsuario = async function() {
        const nombre = document.getElementById('nombre').value;
        const email = document.getElementById('email').value;
        const whatsapp = document.getElementById('whatsapp').value;
        const password = document.getElementById('password').value;

        if(!nombre || !email || !whatsapp || !password) return alert("Llena todos los campos");

        try {
            // 1. Crear el usuario en Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2. Generar número de evento automático (basado en total de eventos)
            const querySnapshot = await getDocs(collection(db, "eventos"));
            const numeroEvento = 100 + querySnapshot.size; 

            // 3. Crear el documento del evento
            await setDoc(doc(db, "eventos", "evento_" + numeroEvento), {
                nombres: nombre,
                email: email,
                whatsapp: whatsapp, // Guardamos el número aquí
                uid: user.uid,
                numeroEvento: numeroEvento,
                bienvenida: "¡Bienvenidos a nuestra mesa de regalos!",
                foto: "https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=1000"
            });

            alert("¡Cuenta creada!");
            window.location.href = "panel.html";

        } catch (error) {
            alert("Error: " + error.message);
        }
    };
</script>
</body>
</html>
