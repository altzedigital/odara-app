<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear mi Mesa - Odara</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo-marfil: #FAF7F2;
            --azul-profundo: #102A43;
            --beige-arena: #E9D8C4;
            --terracota: #C97B63;
            --gris-azul: #5C6770;
            --dorado: #C8A96B;
            --blanco: #ffffff;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--fondo-marfil); 
            color: var(--azul-profundo); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER SIMPLE PARA REGISTRO */
        header { 
            padding: 20px 5%; 
            text-align: center; 
            background: var(--blanco);
            border-bottom: 1px solid var(--beige-arena);
        }
        .logo { max-width: 80px; }

        /* CONTENEDOR PRINCIPAL */
        .main-auth {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: var(--blanco);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(16, 42, 67, 0.05);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid var(--dorado);
        }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { font-size: 1.8rem; margin-bottom: 10px; color: var(--azul-profundo); }
        .auth-header p { color: var(--gris-azul); font-size: 0.9rem; }

        /* FORMULARIO */
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-weight: 600; 
            font-size: 0.75rem; 
            color: var(--gris-azul); 
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .input-auth {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--beige-arena);
            border-radius: 8px;
            background-color: var(--fondo-marfil);
            font-family: inherit;
            color: var(--azul-profundo);
            box-sizing: border-box;
            transition: 0.3s;
        }
        .input-auth:focus {
            outline: none;
            border-color: var(--terracota);
            box-shadow: 0 0 0 3px rgba(201, 123, 99, 0.1);
        }

        .btn-registro {
            width: 100%;
            background-color: var(--azul-profundo);
            color: var(--blanco);
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            margin-top: 10px;
            font-size: 1rem;
        }
        .btn-registro:hover {
            background-color: var(--terracota);
            transform: translateY(-1px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--gris-azul);
        }
        .auth-footer a {
            color: var(--terracota);
            text-decoration: none;
            font-weight: 600;
        }

        /* DETALLE DECORATIVO */
        .decor {
            width: 40px;
            height: 2px;
            background: var(--dorado);
            margin: 20px auto;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html">
        <img src="Gemini_Generated_Image_prfor1prfor1prfo.png" alt="Odara Logo" class="logo">
    </a>
</header>

<main class="main-auth">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Únete a Odara</h2>
            <p>Comienza a crear una experiencia inolvidable para tu evento.</p>
            <div class="decor"></div>
        </div>

        <form id="registro-form">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombre" class="input-auth" placeholder="Ej. Ana García" required>
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" class="input-auth" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" class="input-auth" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="form-group">
                <label>Tipo de Evento</label>
                <select id="tipo-evento" class="input-auth" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="baby-shower">Baby Shower</option>
                    <option value="boda">Boda</option>
                    <option value="cumpleaños">Cumpleaños</option>
                    <option value="otro">Otro Momento Especial</option>
                </select>
            </div>

            <button type="submit" class="btn-registro">CREAR MI CUENTA</button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión aquí</a>
        </div>
    </div>
</main>

<footer style="background: var(--azul-profundo); padding: 20px; text-align: center; color: var(--fondo-marfil); font-size: 0.7rem;">
    © 2026 Odara. Elegancia en cada detalle.
</footer>

</body>
</html>
